<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM: VIP PREDICTOR</title>
    <!-- PWA Setup -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VIP PREDICTOR">
    <style>
        :root {
            --bg-color: rgba(10, 17, 30, 0.95);
            --cyan: #00f3ff;
            --banker: #ef4444;
            --player: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .vip-box {
            background-color: var(--bg-color);
            border: 2px solid rgba(0, 243, 255, 0.4);
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.15);
            overflow: hidden;
            z-index: 1;
        }
        .vip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }
        .vip-title {
            color: var(--cyan);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .vip-close {
            color: #64748b;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .vip-content {
            padding: 25px 20px;
            text-align: center;
        }
        .main-bet {
            font-size: 26px;
            font-weight: 900;
            color: #eab308;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(234, 179, 8, 0.4);
            text-transform: uppercase;
        }
        .main-bet.banker { color: var(--banker); text-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
        .main-bet.player { color: var(--player); text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }

        .sub-bet {
            color: #10b981;
            font-size: 12px;
            font-family: monospace;
            margin-bottom: 25px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .progress-container {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 25px;
        }
        .prog-box {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 6px;
            padding: 10px;
            border: 1px solid #333;
        }
        .banker-box { border-color: rgba(239, 68, 68, 0.4); }
        .player-box { border-color: rgba(59, 130, 246, 0.4); }
        
        .prog-title {
            font-size: 10px;
            color: #64748b;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .prog-value {
            font-size: 22px;
            font-weight: bold;
            font-family: monospace;
        }
        .val-banker { color: var(--banker); text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .val-player { color: var(--player); text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        
        .btn-execute {
            background: rgba(0, 0, 0, 0.5);
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 14px;
            width: 100%;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .btn-execute:active {
            transform: scale(0.98);
        }
        .btn-execute.disabled {
            color: #ef4444;
            border-color: #ef4444;
            box-shadow: none;
            cursor: wait;
        }
        
        #ai-status {
            font-size: 10px;
            color: #64748b;
            margin-top: 15px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="vip-box">
        <div class="vip-header">
            <span class="vip-title">SYSTEM: VIP PREDICTOR</span>
            <span class="vip-close">✕</span>
        </div>
        
        <div class="vip-content">
            <div class="main-bet" id="main-bet">CHỜ ẢNH BÀN CHƠI...</div>
            <div class="sub-bet" id="sub-bet">CẦU CHÍNH: CHƯA XÁC ĐỊNH</div>
            
            <div class="progress-container">
                <div class="prog-box banker-box">
                    <div class="prog-title">BANKER</div>
                    <div class="prog-value val-banker" id="ai-banker">50%</div>
                </div>
                <div class="prog-box player-box">
                    <div class="prog-title">PLAYER</div>
                    <div class="prog-value val-player" id="ai-player">50%</div>
                </div>
            </div>
            
            <input type="file" id="file-upload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button class="btn-execute disabled" id="btn-execute" onclick="if(cvReady) { document.getElementById('file-upload').click(); } else { alert('Hệ thống AI đang tải dữ liệu (Cần 10-20 giây tùy mạng). Vui lòng chờ nút chuyển sang màu XANH!'); }">ĐANG TẢI AI CORE...</button>
            
            <div id="ai-status">ĐANG KHỞI ĐỘNG (CẦN MẠNG MẠNH)...</div>
            <canvas id="cvCanvas" style="display:none;"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        let cvReady = false;
        let historyData = [];

        function checkOpenCvReady() {
            if (typeof cv !== 'undefined' && cv.Mat) {
                cvReady = true;
                document.getElementById('ai-status').innerText = "HỆ THỐNG ĐÃ SẴN SÀNG!";
                document.getElementById('ai-status').style.color = "#10b981";
                let btn = document.getElementById('btn-execute');
                btn.classList.remove('disabled');
                btn.style.color = "#00f3ff";
                btn.style.borderColor = "#00f3ff";
                btn.innerText = "EXECUTE ANALYSIS";
            } else {
                setTimeout(checkOpenCvReady, 500);
            }
        }

        function handleImageUpload(event) {
            if (!cvReady) return;
            const file = event.target.files[0];
            if (!file) return;
            
            document.getElementById('ai-status').innerText = "1/4: ĐANG ĐỌC TỆP ẢNH...";
            document.getElementById('ai-status').style.color = "#00f3ff";
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('ai-status').innerText = "2/4: ĐANG TẢI ẢNH LÊN MÀN HÌNH...";
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('cvCanvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Giảm kích thước xuống 600px để tránh lỗi tràn RAM trên điện thoại
                    const MAX_WIDTH = 600;
                    let w = img.width;
                    let h = img.height;
                    if (w > MAX_WIDTH) {
                        h = Math.round((h * MAX_WIDTH) / w);
                        w = MAX_WIDTH;
                    }
                    canvas.width = w;
                    canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    document.getElementById('ai-status').innerText = "3/4: ĐANG CHẠY LÕI AI QUÉT HẠT...";
                    setTimeout(() => processLiveFrame(canvas), 50);
                };
                img.onerror = function() {
                    document.getElementById('ai-status').innerText = "LỖI: KHÔNG THỂ ĐỌC ĐỊNH DẠNG ẢNH NÀY!";
                    document.getElementById('ai-status').style.color = "#ef4444";
                };
                img.src = e.target.result;
            }
            reader.onerror = function() {
                document.getElementById('ai-status').innerText = "LỖI: BỘ NHỚ TRÌNH DUYỆT TỪ CHỐI TỆP!";
                document.getElementById('ai-status').style.color = "#ef4444";
            };
            reader.readAsDataURL(file);
        }

        function getScanFailureReason(src) {
            try {
                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                
                // Tính độ sáng trung bình
                let mean = cv.mean(gray)[0];
                
                if (mean < 35) {
                    gray.delete();
                    return "Ảnh bị TỐI (thiếu ánh sáng). Vui lòng tăng độ sáng màn hình game hoặc bật thêm đèn.";
                }
                if (mean > 220) {
                    gray.delete();
                    return "Ảnh bị SÁNG QUÁ hoặc LÓA ĐÈN. Vui lòng tắt đèn chiếu thẳng vào màn hình hoặc đổi góc chụp tránh phản chiếu.";
                }
                
                // Tính độ tương phản (Contrast)
                let minMax = cv.minMaxLoc(gray);
                let contrast = minMax.maxVal - minMax.minVal;
                gray.delete();

                if (contrast < 80) {
                    return "Ảnh bị MỜ/NHÒE (camera rung hoặc không lấy nét). Vui lòng giữ chắc tay và chụp lại rõ nét hơn.";
                }
                
                return "Không tìm thấy bảng hạt Bead Plate. Vui lòng đưa camera lại gần, căn chỉnh chụp chính xác bảng tròn lịch sử ở góc trái dưới bàn chơi.";
            } catch (e) {
                return "Ảnh không đủ chất lượng hoặc sai góc chụp. Vui lòng chụp ảnh thẳng góc, rõ nét và đủ ánh sáng.";
            }
        }

        function processLiveFrame(canvas) {
            let src, hsv, mask_r1, mask_r2, mask_r, mask_b, mask_g;
            let lower_red1, upper_red1, lower_red2, upper_red2, lower_blue, upper_blue, lower_green, upper_green;
            
            try {
                src = cv.imread(canvas);

                // 1. Tự động làm sắc nét ảnh (Sharpening Filter) để trị ảnh mờ/nhòe do rung tay
                let sharp = new cv.Mat();
                let kernel = cv.matFromArray(3, 3, cv.CV_32F, [
                     0, -1,  0,
                    -1,  5, -1,
                     0, -1,  0
                ]);
                cv.filter2D(src, sharp, -1, kernel);

                // Chuyển đổi sang hệ màu HSV từ ảnh đã được làm nét
                hsv = new cv.Mat();
                cv.cvtColor(sharp, hsv, cv.COLOR_RGBA2RGB);
                cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);
                sharp.delete(); kernel.delete();

                document.getElementById('ai-status').innerText = "4/4: ĐANG TRÍCH XUẤT MA TRẬN MÀU...";

                // Red (Mở rộng dải màu HSV nhạy hơn để chống lóa và bóng tối)
                lower_red1 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [0, 80, 50, 0]);
                upper_red1 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [10, 255, 255, 0]);
                
                lower_red2 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [170, 80, 50, 0]);
                upper_red2 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [180, 255, 255, 0]);

                lower_blue = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [90, 80, 50, 0]);
                upper_blue = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [130, 255, 255, 0]);

                lower_green = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [35, 60, 50, 0]);
                upper_green = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [85, 255, 255, 0]);

                mask_r1 = new cv.Mat();
                cv.inRange(hsv, lower_red1, upper_red1, mask_r1);

                mask_r2 = new cv.Mat();
                cv.inRange(hsv, lower_red2, upper_red2, mask_r2);

                mask_r = new cv.Mat();
                cv.add(mask_r1, mask_r2, mask_r);

                mask_b = new cv.Mat();
                cv.inRange(hsv, lower_blue, upper_blue, mask_b);

                mask_g = new cv.Mat();
                cv.inRange(hsv, lower_green, upper_green, mask_g);

                // Thực hiện đóng/mở hình thái (morphologyEx) để làm sạch nhiễu
                let morphKernel = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(3, 3));
                
                let clean_mask_r = new cv.Mat();
                cv.morphologyEx(mask_r, clean_mask_r, cv.MORPH_OPEN, morphKernel);
                cv.morphologyEx(clean_mask_r, clean_mask_r, cv.MORPH_CLOSE, morphKernel);

                let clean_mask_b = new cv.Mat();
                cv.morphologyEx(mask_b, clean_mask_b, cv.MORPH_OPEN, morphKernel);
                cv.morphologyEx(clean_mask_b, clean_mask_b, cv.MORPH_CLOSE, morphKernel);

                let clean_mask_g = new cv.Mat();
                cv.morphologyEx(mask_g, clean_mask_g, cv.MORPH_OPEN, morphKernel);
                cv.morphologyEx(clean_mask_g, clean_mask_g, cv.MORPH_CLOSE, morphKernel);

                function findDots(cleanMask, colorChar) {
                    let contours = new cv.MatVector();
                    let hierarchy = new cv.Mat();
                    cv.findContours(cleanMask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                    let dots = [];
                    for (let i = 0; i < contours.size(); i++) {
                        let cnt = contours.get(i);
                        let area = cv.contourArea(cnt);
                        if (area > 8 && area < src.rows * src.cols * 0.05) {
                            let rect = cv.boundingRect(cnt);
                            let aspect = rect.width / rect.height;
                            if (aspect > 0.7 && aspect < 1.4) {
                                dots.push({
                                    x: rect.x + rect.width / 2,
                                    y: rect.y + rect.height / 2,
                                    w: rect.width,
                                    color: colorChar,
                                    area: area
                                });
                            }
                        }
                    }
                    contours.delete(); hierarchy.delete();
                    return dots;
                }

                let allDots = [];
                allDots = allDots.concat(findDots(clean_mask_r, 'B'));
                allDots = allDots.concat(findDots(clean_mask_b, 'P'));
                allDots = allDots.concat(findDots(clean_mask_g, 'T'));

                // Tự hiệu chuẩn bộ lọc nhiễu theo diện tích trung vị (Median Area)
                if (allDots.length > 0) {
                    let areas = allDots.map(d => d.area).sort((a, b) => a - b);
                    let medianArea = areas[Math.floor(areas.length / 2)];
                    allDots = allDots.filter(d => d.area >= medianArea * 0.35 && d.area <= medianArea * 2.5);
                }

                var failureReason = "";
                if (allDots.length > 0) {
                    // Tính kích thước hạt trung bình
                    let avgW = 0;
                    allDots.forEach(d => avgW += d.w);
                    avgW /= allDots.length;

                    // Sắp xếp các hạt từ trái sang phải
                    allDots.sort((a, b) => a.x - b.x);

                    // Gom nhóm các hạt thành các cột
                    let columns = [];
                    let current_col = [];
                    let col_width_thresh = avgW * 0.85;

                    allDots.forEach(dot => {
                        if (current_col.length === 0) {
                            current_col.push(dot);
                        } else {
                            if (Math.abs(dot.x - current_col[current_col.length - 1].x) < col_width_thresh) {
                                current_col.push(dot);
                            } else {
                                current_col.sort((a, b) => a.y - b.y);
                                columns.push(current_col);
                                current_col = [dot];
                            }
                        }
                    });
                    if (current_col.length > 0) {
                        current_col.sort((a, b) => a.y - b.y);
                        columns.push(current_col);
                    }

                    // Lọc bỏ các cột thuộc bảng khác (như Big Road) nằm bên phải bằng cách phát hiện khoảng trống lớn (gap)
                    let filteredColumns = [];
                    let maxGap = avgW * 2.2; // Khoảng cách tối đa giữa 2 cột hạt liền kề của Bead Plate
                    for (let i = 0; i < columns.length; i++) {
                        if (i === 0) {
                            filteredColumns.push(columns[i]);
                        } else {
                            let colX = columns[i].reduce((sum, d) => sum + d.x, 0) / columns[i].length;
                            let prevColX = columns[i-1].reduce((sum, d) => sum + d.x, 0) / columns[i-1].length;
                            if (colX - prevColX > maxGap) {
                                // Phát hiện khoảng cách lớn (đã chuyển sang Big Road hoặc bảng phụ), ngắt không lấy tiếp các cột sau
                                break;
                            }
                            filteredColumns.push(columns[i]);
                        }
                    }
                    columns = filteredColumns;

                    // Kiểm tra lưới hạt hợp lệ
                    let totalCols = columns.length;
                    if (allDots.length < 4) {
                        allDots = [];
                        failureReason = "Ảnh chụp không phát hiện đủ số lượng hạt. Vui lòng căn camera lại gần bảng lịch sử hơn.";
                    } else if (totalCols > 15) {
                        allDots = [];
                        failureReason = "Ảnh chụp phong cảnh hoặc ngoài bảng chơi. Vui lòng hướng camera chính xác vào bảng hạt lịch sử Baccarat.";
                    } else {
                        let finalResults = [];
                        columns.forEach(col => {
                            col.forEach(dot => {
                                finalResults.push(dot.color);
                            });
                        });
                        historyData = finalResults;
                    }
                }

                if (allDots.length === 0 && !failureReason) {
                    failureReason = getScanFailureReason(src);
                }

                // Cleanup các vùng nhớ OpenCV
                src.delete(); hsv.delete(); mask_r1.delete(); mask_r2.delete(); mask_r.delete();
                mask_b.delete(); mask_g.delete(); lower_red1.delete(); upper_red1.delete();
                lower_red2.delete(); upper_red2.delete(); lower_blue.delete(); upper_blue.delete();
                lower_green.delete(); upper_green.delete(); morphKernel.delete();
                clean_mask_r.delete(); clean_mask_b.delete(); clean_mask_g.delete();

                if (allDots.length > 0) {
                    updatePrediction();
                    document.getElementById('ai-status').innerText = "";
                } else {
                    document.getElementById('ai-status').innerHTML = 
                        `<span style="color:#ef4444; font-weight:bold;">QUÉT THẤT BẠI!</span><br>` +
                        `<span style="font-size:12px; color:#94a3b8; display:inline-block; margin-top:4px; line-height: 1.4;">Lý do: ${failureReason}</span><br>` +
                        `<span style="color:#00f3ff; font-weight:bold; font-size:13px; display:inline-block; margin-top:8px;">👉 Vui lòng chụp lại ảnh khác!</span>`;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('ai-status').innerHTML = 
                    `<span style="color:#ef4444; font-weight:bold;">QUÉT THẤT BẠI!</span><br>` +
                    `<span style="font-size:12px; color:#94a3b8; display:inline-block; margin-top:4px;">Lý do: Lỗi xử lý dữ liệu ảnh hoặc sai định dạng.</span><br>` +
                    `<span style="color:#00f3ff; font-weight:bold; font-size:13px; display:inline-block; margin-top:8px;">👉 Vui lòng chụp lại ảnh khác!</span>`;
            }
            
            document.getElementById('file-upload').value = '';
        }

        function updatePrediction() {
            let cleanHistory = historyData.filter(x => x === 'P' || x === 'B');
            let mainBetEl = document.getElementById('main-bet');
            let subBetEl = document.getElementById('sub-bet');
            let pBanker = document.getElementById('ai-banker');
            let pPlayer = document.getElementById('ai-player');

            if (cleanHistory.length < 3) {
                mainBetEl.innerText = "ĐANG ĐỢI CẦU...";
                mainBetEl.className = "main-bet";
                mainBetEl.style.color = "#94a3b8";
                subBetEl.innerText = "CẦU CHÍNH: TÍCH LŨY DỮ LIỆU";
                pBanker.innerText = "50%";
                pPlayer.innerText = "50%";
                return;
            }

            // --- THUẬT TOÁN NHẬN DIỆN CẦU BACCARAT AI NÂNG CAO ---
            let len = cleanHistory.length;
            let last = cleanHistory[len - 1];
            
            // 1. Tính toán độ dài chuỗi bệt hiện tại
            let streakLen = 0;
            for (let i = len - 1; i >= 0; i--) {
                if (cleanHistory[i] === last) {
                    streakLen++;
                } else {
                    break;
                }
            }

            let pred = "";
            let percent = 50;
            let pattern = "PHÂN TÍCH NÂNG CAO";

            // Nhận diện theo tầm nhìn thông minh
            if (streakLen >= 3) {
                pred = last; // Theo cầu bệt
                percent = Math.min(75 + streakLen * 2, 92); // Càng bệt dài độ tin cậy càng cao
                pattern = `Cầu bệt ${last === 'P' ? 'PLAYER' : 'BANKER'} (${streakLen} tay)`;
            } else if (streakLen === 2) {
                // Kiểm tra cầu 2-2: ..., B, B, P, P
                if (len >= 4 && cleanHistory[len-3] !== last && cleanHistory[len-4] === cleanHistory[len-3]) {
                    pred = last; // Đánh tiếp cho đủ cặp đôi
                    percent = 72;
                    pattern = `Cầu đôi 2-2 (${last === 'P' ? 'PLAYER' : 'BANKER'})`;
                } else {
                    // Cầu 2-1: ..., B, P, P -> đánh ngược
                    pred = last === 'P' ? 'B' : 'P';
                    percent = 68;
                    pattern = `Cầu nhảy 2-1 (${pred === 'P' ? 'PLAYER' : 'BANKER'})`;
                }
            } else {
                // streakLen === 1
                // Kiểm tra cầu nhảy 1-1 (Ping-pong): ..., P, B, P
                if (len >= 3 && cleanHistory[len-2] !== last && cleanHistory[len-3] === last) {
                    pred = last === 'P' ? 'B' : 'P'; // Đánh nhảy tiếp
                    percent = 75;
                    pattern = `Cầu nhảy 1-1 (${pred === 'P' ? 'PLAYER' : 'BANKER'})`;
                } else {
                    // Cầu ngắn ngẫu nhiên -> Bám cầu thuận hoặc bẻ cầu nhẹ
                    pred = last === 'P' ? 'B' : 'P';
                    percent = 58;
                    pattern = "Cầu ngắn - Đánh ngược";
                }
            }

            if (pred === "B") {
                mainBetEl.innerText = "ĐÁNH CÁI (BANKER)";
                mainBetEl.className = "main-bet banker";
                pBanker.innerText = percent + "%";
                pPlayer.innerText = (100 - percent) + "%";
            } else {
                mainBetEl.innerText = "ĐÁNH CON (PLAYER)";
                mainBetEl.className = "main-bet player";
                pPlayer.innerText = percent + "%";
                pBanker.innerText = (100 - percent) + "%";
            }
            subBetEl.innerText = "CẦU CHÍNH: " + pattern.toUpperCase();
        }
    </script>

    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('PWA Service Worker registered:', reg.scope);
                }).catch(err => {
                    console.error('PWA Service Worker failed:', err);
                });
            });
        }

        // --- BACCARAT VIP DAILY ACTIVATION LOCK ---
        function checkBaccaratDailyCode() {
            const now = new Date();
            const day = now.getDate();
            const month = now.getMonth() + 1;
            const year = now.getFullYear();
            const seed = (day * 8271 + month * 1923 + year * 77) % 900000 + 100000;
            return "BCR" + seed;
        }

        window.addEventListener('load', () => {
            if (sessionStorage.getItem('baccarat_unlocked') !== 'true') {
                showBaccaratLockOverlay();
            }
        });

        function showBaccaratLockOverlay() {
            let overlay = document.createElement('div');
            overlay.id = 'baccarat-lock-overlay';
            overlay.style.cssText = 'position:fixed;inset:0;z-index:999999;background:#02040a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;color:#fff;padding:20px;text-align:center;';
            overlay.innerHTML = `
                <div style="max-width:360px;background:rgba(10,17,30,0.95);border:2px solid #00f3ff;border-radius:12px;padding:30px;box-shadow:0 0 25px rgba(0,243,255,0.2);">
                    <div style="font-size:40px;margin-bottom:15px;">🔒</div>
                    <div style="font-size:18px;font-weight:bold;color:#00f3ff;margin-bottom:8px;letter-spacing:1px;">KÍCH HOẠT BACCARAT VIP</div>
                    <div style="font-size:12px;color:#94a3b8;line-height:1.6;margin-bottom:20px;">Vui lòng nhập Mã Kích Hoạt hôm nay để mở khóa công cụ.<br><span style="color:#f59e0b;font-weight:bold;">(Mã thay đổi ngẫu nhiên mỗi ngày)</span></div>
                    <input type="text" id="baccaratLockInput" placeholder="BCRxxxxxx" style="width:100%;padding:12px;background:#000;border:1px solid #00f3ff;color:#fff;text-align:center;font-size:14px;border-radius:6px;margin-bottom:20px;">
                    <button onclick="unlockBaccarat()" style="width:100%;padding:12px;background:#00f3ff;border:none;color:#000;font-weight:bold;font-size:13px;border-radius:6px;cursor:pointer;box-shadow:0 0 10px rgba(0,243,255,0.3);">XÁC NHẬN KÍCH HOẠT</button>
                </div>
            `;
            document.body.appendChild(overlay);
            
            window.unlockBaccarat = () => {
                const inputVal = document.getElementById('baccaratLockInput').value.trim();
                const correctCode = checkBaccaratDailyCode();
                if (inputVal === correctCode) {
                    sessionStorage.setItem('baccarat_unlocked', 'true');
                    overlay.remove();
                } else {
                    alert("Mã kích hoạt không chính xác!");
                }
            };
        }
    </script>
