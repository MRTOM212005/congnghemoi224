<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM: VIP PREDICTOR</title>
    <style>
        :root {
            --bg-color: rgba(10, 17, 30, 0.95);
            --cyan: #00f3ff;
            --banker: #ef4444;
            --player: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .vip-box {
            background-color: var(--bg-color);
            border: 2px solid rgba(0, 243, 255, 0.4);
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.15);
            overflow: hidden;
            z-index: 1;
        }
        .vip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }
        .vip-title {
            color: var(--cyan);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .vip-close {
            color: #64748b;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .vip-content {
            padding: 25px 20px;
            text-align: center;
        }
        .main-bet {
            font-size: 26px;
            font-weight: 900;
            color: #eab308;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(234, 179, 8, 0.4);
            text-transform: uppercase;
        }
        .main-bet.banker { color: var(--banker); text-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
        .main-bet.player { color: var(--player); text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }

        .sub-bet {
            color: #10b981;
            font-size: 12px;
            font-family: monospace;
            margin-bottom: 25px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .progress-container {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 25px;
        }
        .prog-box {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 6px;
            padding: 10px;
            border: 1px solid #333;
        }
        .banker-box { border-color: rgba(239, 68, 68, 0.4); }
        .player-box { border-color: rgba(59, 130, 246, 0.4); }
        
        .prog-title {
            font-size: 10px;
            color: #64748b;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .prog-value {
            font-size: 22px;
            font-weight: bold;
            font-family: monospace;
        }
        .val-banker { color: var(--banker); text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .val-player { color: var(--player); text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        
        .btn-execute {
            background: rgba(0, 0, 0, 0.5);
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 14px;
            width: 100%;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.1);
        }
        .btn-execute:active {
            transform: scale(0.98);
        }
        .btn-execute.disabled {
            color: #4b5563;
            border-color: #374151;
            box-shadow: none;
            cursor: not-allowed;
        }
        
        #ai-status {
            font-size: 10px;
            color: #64748b;
            margin-top: 15px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="vip-box">
        <div class="vip-header">
            <span class="vip-title">SYSTEM: VIP PREDICTOR</span>
            <span class="vip-close">✕</span>
        </div>
        
        <div class="vip-content">
            <div class="main-bet" id="main-bet">CHỜ ẢNH BÀN CHƠI...</div>
            <div class="sub-bet" id="sub-bet">CẦU CHÍNH: CHƯA XÁC ĐỊNH</div>
            
            <div class="progress-container">
                <div class="prog-box banker-box">
                    <div class="prog-title">BANKER</div>
                    <div class="prog-value val-banker" id="ai-banker">50%</div>
                </div>
                <div class="prog-box player-box">
                    <div class="prog-title">PLAYER</div>
                    <div class="prog-value val-player" id="ai-player">50%</div>
                </div>
            </div>
            
            <input type="file" id="file-upload" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button class="btn-execute disabled" id="btn-execute" onclick="document.getElementById('file-upload').click()">ĐANG TẢI AI CORE...</button>
            
            <div id="ai-status">VUI LÒNG ĐỢI...</div>
            <canvas id="cvCanvas" style="display:none;"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        let cvReady = false;
        let historyData = [];

        function checkOpenCvReady() {
            if (typeof cv !== 'undefined' && cv.Mat) {
                cvReady = true;
                document.getElementById('ai-status').innerText = "HỆ THỐNG SẴN SÀNG";
                document.getElementById('ai-status').style.color = "#10b981";
                let btn = document.getElementById('btn-execute');
                btn.classList.remove('disabled');
                btn.innerText = "EXECUTE ANALYSIS";
            } else {
                setTimeout(checkOpenCvReady, 500);
            }
        }
        
        function handleImageUpload(event) {
            if (!cvReady) return;
            const file = event.target.files[0];
            if (!file) return;
            
            document.getElementById('ai-status').innerText = "ĐANG PHÂN TÍCH ẢNH...";
            document.getElementById('ai-status').style.color = "#00f3ff";
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('cvCanvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Limit size for performance
                    const MAX_WIDTH = 1280;
                    let w = img.width;
                    let h = img.height;
                    if (w > MAX_WIDTH) {
                        h = Math.round((h * MAX_WIDTH) / w);
                        w = MAX_WIDTH;
                    }
                    canvas.width = w;
                    canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    setTimeout(() => processLiveFrame(canvas), 100);
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function processLiveFrame(canvas) {
            let src, hsv, mask_r1, mask_r2, mask_r, mask_b, mask_g;
            let lower_red1, upper_red1, lower_red2, upper_red2, lower_blue, upper_blue, lower_green, upper_green;
            
            try {
                src = cv.imread(canvas);
                hsv = new cv.Mat();
                cv.cvtColor(src, hsv, cv.COLOR_RGBA2RGB);
                cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);

                // Red
                lower_red1 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [0, 40, 50, 0]);
                upper_red1 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [15, 255, 255, 0]);
                mask_r1 = new cv.Mat();
                cv.inRange(hsv, lower_red1, upper_red1, mask_r1);

                lower_red2 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [160, 40, 50, 0]);
                upper_red2 = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [180, 255, 255, 0]);
                mask_r2 = new cv.Mat();
                cv.inRange(hsv, lower_red2, upper_red2, mask_r2);

                mask_r = new cv.Mat();
                cv.add(mask_r1, mask_r2, mask_r);

                // Blue
                lower_blue = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [90, 40, 50, 0]);
                upper_blue = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [130, 255, 255, 0]);
                mask_b = new cv.Mat();
                cv.inRange(hsv, lower_blue, upper_blue, mask_b);

                // Green
                lower_green = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [35, 40, 50, 0]);
                upper_green = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [85, 255, 255, 0]);
                mask_g = new cv.Mat();
                cv.inRange(hsv, lower_green, upper_green, mask_g);

                function findDots(mask, colorLabel) {
                    let contours = new cv.MatVector();
                    let hierarchy = new cv.Mat();
                    cv.findContours(mask, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                    let dots = [];
                    for (let i = 0; i < contours.size(); i++) {
                        let cnt = contours.get(i);
                        let area = cv.contourArea(cnt);
                        if (area > 5 && area < src.rows * src.cols * 0.1) {
                            let rect = cv.boundingRect(cnt);
                            let aspect = rect.width / rect.height;
                            if (aspect > 0.6 && aspect < 1.6) {
                                dots.push({ x: rect.x, y: rect.y, color: colorLabel, w: rect.width });
                            }
                        }
                    }
                    contours.delete(); hierarchy.delete();
                    return dots;
                }

                let allDots = [];
                allDots = allDots.concat(findDots(mask_r, 'B'));
                allDots = allDots.concat(findDots(mask_b, 'P'));
                allDots = allDots.concat(findDots(mask_g, 'T'));

                // Clean up Mats early
                src.delete(); hsv.delete(); mask_r1.delete(); mask_r2.delete(); mask_r.delete();
                mask_b.delete(); mask_g.delete(); lower_red1.delete(); upper_red1.delete();
                lower_red2.delete(); upper_red2.delete(); lower_blue.delete(); upper_blue.delete();
                lower_green.delete(); upper_green.delete();

                if(allDots.length > 0) {
                    allDots.sort((a, b) => a.x - b.x);

                    let columns = [];
                    let currCol = [allDots[0]];
                    let refW = allDots[0].w;
                    
                    for(let i=1; i<allDots.length; i++) {
                        let d = allDots[i];
                        if (Math.abs(d.x - currCol[currCol.length-1].x) < refW * 1.5) {
                            currCol.push(d);
                        } else {
                            columns.push(currCol);
                            currCol = [d];
                        }
                    }
                    columns.push(currCol);

                    let beadPlateCols = columns.slice(0, 10);
                    historyData = [];
                    for(let col of beadPlateCols) {
                        col.sort((a, b) => a.y - b.y);
                        for(let dot of col) {
                            historyData.push(dot.color);
                        }
                    }

                    updatePrediction();
                    document.getElementById('ai-status').innerText = `QUÉT THÀNH CÔNG! (${historyData.length} ván)`;
                    document.getElementById('ai-status').style.color = "#10b981";
                } else {
                    document.getElementById('ai-status').innerText = "KHÔNG TÌM THẤY BẢNG LỊCH SỬ HẠT!";
                    document.getElementById('ai-status').style.color = "#ef4444";
                }
            } catch (err) {
                console.error(err);
                document.getElementById('ai-status').innerText = "LỖI PHÂN TÍCH ẢNH!";
                document.getElementById('ai-status').style.color = "#ef4444";
            }
            
            document.getElementById('file-upload').value = '';
        }

        function updatePrediction() {
            let cleanHistory = historyData.filter(x => x === 'P' || x === 'B');
            let mainBetEl = document.getElementById('main-bet');
            let subBetEl = document.getElementById('sub-bet');
            let pBanker = document.getElementById('ai-banker');
            let pPlayer = document.getElementById('ai-player');

            if (cleanHistory.length < 3) {
                mainBetEl.innerText = "ĐANG ĐỢI CẦU...";
                mainBetEl.className = "main-bet";
                mainBetEl.style.color = "#94a3b8";
                subBetEl.innerText = "CẦU CHÍNH: TÍCH LŨY DỮ LIỆU";
                pBanker.innerText = "50%";
                pPlayer.innerText = "50%";
                return;
            }

            let last3 = cleanHistory.slice(-3).join('');
            let last4 = cleanHistory.slice(-4).join('');

            let pred = "";
            let percent = 50;
            let pattern = "PHÂN TÍCH NÂNG CAO";

            if (last3 === "PPP") { pred = "P"; percent = 78; pattern = "Cầu bệt PLAYER"; }
            else if (last3 === "BBB") { pred = "B"; percent = 78; pattern = "Cầu bệt BANKER"; }
            else if (last3 === "PBP") { pred = "B"; percent = 70; pattern = "Cầu nhảy 1-1 (Banker)"; }
            else if (last3 === "BPB") { pred = "P"; percent = 70; pattern = "Cầu nhảy 1-1 (Player)"; }
            else if (last4 === "PPBB") { pred = "P"; percent = 68; pattern = "Cầu đôi 2-2 (Player)"; }
            else if (last4 === "BBPP") { pred = "B"; percent = 68; pattern = "Cầu đôi 2-2 (Banker)"; }
            else if (last3 === "PPB") { pred = "B"; percent = 65; pattern = "Cầu 2-1 (Banker)"; }
            else if (last3 === "BBP") { pred = "P"; percent = 65; pattern = "Cầu 2-1 (Player)"; }
            else {
                pred = cleanHistory[cleanHistory.length-1] === 'P' ? 'B' : 'P';
                percent = 55;
                pattern = "Cầu ngắn - Đánh ngược";
            }

            if (pred === "B") {
                mainBetEl.innerText = "ĐÁNH CÁI (BANKER)";
                mainBetEl.className = "main-bet banker";
                pBanker.innerText = percent + "%";
                pPlayer.innerText = (100 - percent) + "%";
            } else {
                mainBetEl.innerText = "ĐÁNH CON (PLAYER)";
                mainBetEl.className = "main-bet player";
                pPlayer.innerText = percent + "%";
                pBanker.innerText = (100 - percent) + "%";
            }
            subBetEl.innerText = "CẦU CHÍNH: " + pattern.toUpperCase();
        }
    </script>
    
    <script async src="https://cdn.jsdelivr.net/gh/wallat/compiled-opencv/opencv.js" onload="checkOpenCvReady()" type="text/javascript"></script>

    <script>
        particlesJS("particles-js", {
            "particles": { "number": { "value": 40 }, "color": { "value": "#00f3ff" }, "opacity": { "value": 0.3 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 150, "color": "#00f3ff", "opacity": 0.2 } }
        });
    </script>
</body>
</html>
